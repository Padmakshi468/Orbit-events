<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — Orbit</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="register">

  <div class="auth-page">

    <!-- Visual Panel -->
    <div class="auth-panel auth-panel--visual">
      <div class="auth-visual-blob blob-1"></div>
      <div class="auth-visual-blob blob-2"></div>
      <div class="auth-visual-content">
        <div style="font-size:3.5rem; margin-bottom:1.5rem;">🚀</div>
        <h2>Join the Orbit<br>community</h2>
        <p style="margin-top:1rem;">Connect with thousands of event-goers, discover new experiences, and manage everything in one platform.</p>
        <div style="margin-top:3rem; display:flex; gap:1.5rem; justify-content:center; flex-wrap:wrap;">
          <div style="text-align:center;">
            <div style="font-size:1.8rem; font-weight:800; color:#fff;">500+</div>
            <div style="font-size:.8rem; color:rgba(255,255,255,.6);">Events hosted</div>
          </div>
          <div style="text-align:center;">
            <div style="font-size:1.8rem; font-weight:800; color:#fff;">2K+</div>
            <div style="font-size:.8rem; color:rgba(255,255,255,.6);">Active users</div>
          </div>
          <div style="text-align:center;">
            <div style="font-size:1.8rem; font-weight:800; color:#fff;">98%</div>
            <div style="font-size:.8rem; color:rgba(255,255,255,.6);">Satisfaction</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Form Panel -->
    <div class="auth-panel auth-panel--form">
      <div class="auth-card">

        <div class="auth-logo">⬤ Orbit</div>
        <h1 class="auth-title">Create your account</h1>
        <p class="auth-subtitle">Free forever. No credit card needed.</p>

        <form id="register-form" novalidate autocomplete="on">

          <div class="form-group">
            <label for="name">Full name</label>
            <input type="text" id="name" placeholder="Your full name" autocomplete="name" required>
          </div>

          <div class="form-group">
            <label for="email">Email address</label>
            <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrapper">
              <input type="password" id="password" placeholder="Create a strong password" autocomplete="new-password" required>
              <button type="button" class="password-toggle" aria-label="Toggle password visibility">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
            <div class="strength-track"><div id="strength-bar"></div></div>
            <span id="strength-label"></span>
          </div>

          <button type="submit" class="btn btn-primary btn-block" style="margin-top:.5rem;">Create Account</button>
        </form>

        <div class="auth-link">
          Already have an account? <a href="login.html">Sign in</a>
        </div>

      </div>
    </div>

  </div>

  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
